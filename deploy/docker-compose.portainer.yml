version: "3.9"

services:
  faster-whisper-api:
    image: ghcr.io/forgeguard-ai/faster-whisper-server:latest
    container_name: faster-whisper-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MODEL_SIZE: large-v3
      DEVICE: cuda
      COMPUTE_TYPE: float16
      BEAM_SIZE: "5"
      ENABLE_VAD_FILTER: "true"
      DEFAULT_LANGUAGE: ""
      API_KEY: ""
      # Load the model in the background at boot (default); the socket serves
      # /health immediately while it warms.
      WARMUP_ON_START: "true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      # The image's default model (large-v3) is baked in at /app/models — this
      # cache volume is only needed to persist a runtime MODEL_SIZE override
      # download. NEVER mount a volume over /app/models (it would shadow the
      # baked weights).
      - faster-whisper-cache:/home/appuser/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  faster-whisper-cache:
